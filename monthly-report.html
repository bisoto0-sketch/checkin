<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>本月打卡記錄</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f4f5f7;
    margin: 0;
    padding: 16px;
    min-height: 100vh;
  }
  .header {
    background: #06C755;
    color: #fff;
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-name { font-size: 16px; font-weight: 600; }
  .header-month { font-size: 14px; opacity: 0.85; }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  .month-nav button {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 16px;
    cursor: pointer;
  }
  .month-label { font-size: 16px; font-weight: 700; color: #333; min-width: 90px; text-align: center; }
  .summary-card {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-around;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .summary-item { text-align: center; }
  .summary-item .val { font-size: 22px; font-weight: 700; color: #06C755; }
  .summary-item .lbl { font-size: 11px; color: #999; margin-top: 2px; }
  .day-card {
    background: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .day-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .day-date { font-size: 14px; font-weight: 700; color: #333; }
  .day-status { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .status-done { background: #e6f9ee; color: #06C755; }
  .status-pending { background: #fff3e0; color: #e67e22; }
  .day-times { display: flex; gap: 16px; font-size: 13px; color: #555; }
  .day-times span { color: #999; font-size: 11px; }
  .day-hours { font-size: 13px; color: #888; margin-top: 4px; }
  .day-addr { font-size: 11px; color: #aaa; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty { text-align: center; color: #bbb; padding: 40px 0; font-size: 14px; }
  .loading { text-align: center; color: #999; padding: 40px 0; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-name" id="userName">載入中...</div>
    <div class="header-month">本月打卡記錄</div>
  </div>
  <img id="userAvatar" style="width:40px;height:40px;border-radius:50%;display:none;">
</div>

<div class="month-nav">
  <button id="btnPrev">‹</button>
  <div class="month-label" id="monthLabel">----/--</div>
  <button id="btnNext">›</button>
</div>

<div class="summary-card" id="summaryCard" style="display:none;">
  <div class="summary-item">
    <div class="val" id="sumDays">0</div>
    <div class="lbl">出勤天數</div>
  </div>
  <div class="summary-item">
    <div class="val" id="sumHours">0</div>
    <div class="lbl">總工時(小時)</div>
  </div>
  <div class="summary-item">
    <div class="val" id="sumOvertime">0</div>
    <div class="lbl">加班時數</div>
  </div>
</div>

<div id="recordList"><div class="loading">載入中...</div></div>

<script>
const LIFF_ID = "2010558375-YvOF3077";
const API_URL = "https://script.google.com/macros/s/AKfycbzYwVnpXFGSOGorojA4Axi8zNd6SVZNQKlyLrKLwPjoUDgP9wNubYDHxsCB5sb4XHB8/exec";

let userId = '';
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;

function pad(n){ return n.toString().padStart(2,'0'); }
function monthStr(){ return `${currentYear}-${pad(currentMonth)}`; }
function monthDisplay(){ return `${currentYear}/${pad(currentMonth)}`; }

function updateMonthLabel(){
  document.getElementById('monthLabel').textContent = monthDisplay();
}

document.getElementById('btnPrev').addEventListener('click', () => {
  currentMonth--;
  if(currentMonth < 1){ currentMonth = 12; currentYear--; }
  updateMonthLabel();
  loadData();
});
document.getElementById('btnNext').addEventListener('click', () => {
  const now = new Date();
  if(currentYear === now.getFullYear() && currentMonth >= now.getMonth()+1) return;
  currentMonth++;
  if(currentMonth > 12){ currentMonth = 1; currentYear++; }
  updateMonthLabel();
  loadData();
});

async function loadData(){
  document.getElementById('recordList').innerHTML = '<div class="loading">載入中...</div>';
  document.getElementById('summaryCard').style.display = 'none';
  try {
    const url = `${API_URL}?action=monthly&userId=${encodeURIComponent(userId)}&month=${monthStr()}`;
    const res = await fetch(url);
    const result = await res.json();

    if(!result.success || result.data.length === 0){
      document.getElementById('recordList').innerHTML = '<div class="empty">這個月沒有打卡記錄</div>';
      return;
    }

    const rows = result.data;
    let totalHours = 0, totalOvertime = 0, days = 0;
    rows.forEach(r => {
      if(r.inTime){ days++; }
      totalHours += Number(r.totalHours) || 0;
      totalOvertime += Number(r.overtimeHours) || 0;
    });

    document.getElementById('sumDays').textContent = days;
    document.getElementById('sumHours').textContent = Math.round(totalHours * 10) / 10;
    document.getElementById('sumOvertime').textContent = Math.round(totalOvertime * 10) / 10;
    document.getElementById('summaryCard').style.display = 'flex';

    const weekDays = ['日','一','二','三','四','五','六'];
    document.getElementById('recordList').innerHTML = rows.map(r => {
      const d = new Date(r.date + 'T00:00:00');
      const wd = weekDays[d.getDay()];
      const statusClass = r.status === '已完成' ? 'status-done' : 'status-pending';
      const statusText = r.status || '—';
      return `
        <div class="day-card">
          <div class="day-top">
            <div class="day-date">${r.date} (${wd})</div>
            <div class="day-status ${statusClass}">${statusText}</div>
          </div>
          <div class="day-times">
            <div><span>上班</span><br>${r.inTime || '—'}</div>
            <div><span>下班</span><br>${r.outTime || '—'}</div>
            <div><span>工時</span><br>${r.totalHours}h</div>
            ${r.overtimeHours > 0 ? `<div><span>加班</span><br>${r.overtimeHours}h</div>` : ''}
          </div>
          ${r.address ? `<div class="day-addr">📌 ${r.address}</div>` : ''}
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('recordList').innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
  }
}

async function main(){
  updateMonthLabel();
  try {
    await liff.init({ liffId: LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const profile = await liff.getProfile();
    userId = profile.userId;
    document.getElementById('userName').textContent = profile.displayName;
    if(profile.pictureUrl){
      const av = document.getElementById('userAvatar');
      av.src = profile.pictureUrl;
      av.style.display = 'block';
    }
    loadData();
  } catch(e) {
    document.getElementById('recordList').innerHTML = `<div class="empty">初始化失敗：${e.message}</div>`;
  }
}
main();
</script>
</body>
</html>
