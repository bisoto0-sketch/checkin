<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>管理後台</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f4f5f7; margin: 0; padding: 0 0 30px;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  .header {
    width: 100%; background: linear-gradient(135deg, #1a1a2e, #0f3460);
    color: #fff; padding: 20px 20px 16px; text-align: center;
  }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; opacity: .65; margin-top: 3px; }

  /* Tabs */
  .tabs {
    display: flex; width: 100%; max-width: 480px;
    background: #fff; border-bottom: 2px solid #eee;
    position: sticky; top: 0; z-index: 10;
  }
  .tab {
    flex: 1; padding: 12px 4px; border: none; background: transparent;
    font-size: 13px; font-weight: 600; color: #999; cursor: pointer;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab.active { color: #0f3460; border-bottom-color: #0f3460; }

  .panel { display: none; width: 100%; max-width: 480px; padding: 16px; }
  .panel.active { display: block; }

  /* Month bar */
  .month-bar {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: #fff; border-radius: 12px; padding: 10px 16px;
    margin-bottom: 14px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .month-bar button {
    border: none; background: #eee; border-radius: 8px;
    width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: #444;
  }
  .month-label { font-size: 15px; font-weight: 700; color: #333; min-width: 90px; text-align: center; }

  /* Employee card */
  .emp-card {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .emp-header { display: flex; align-items: center; justify-content: space-between; }
  .emp-name { font-size: 15px; font-weight: 700; color: #222; }
  .badge {
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; white-space: nowrap;
  }
  .badge-in   { background: #e6f9ee; color: #06C755; }
  .badge-out  { background: #e8f5e9; color: #2e7d32; }
  .badge-none { background: #f5f5f5; color: #aaa; }
  .badge-holiday { background: #fff3e0; color: #FF8C00; }
  .emp-times { font-size: 12px; color: #777; margin-top: 6px; }

  /* Monthly detail */
  .emp-card.collapsible { cursor: pointer; }
  .emp-card .summary { display: flex; gap: 16px; margin-top: 6px; }
  .summary-item { font-size: 12px; color: #777; }
  .summary-item strong { color: #333; font-size: 13px; }
  .detail-rows { display: none; margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
  .detail-rows.open { display: block; }
  .day-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid #f8f8f8; font-size: 12px;
  }
  .day-date { color: #555; font-weight: 600; }
  .day-times { color: #888; }
  .day-hours { color: #0f3460; font-weight: 700; }

  /* Leave */
  .leave-card {
    background: #fff; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .leave-name { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 6px; }
  .leave-item {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #666; padding: 4px 0; border-top: 1px solid #f5f5f5;
  }

  .loading { text-align: center; color: #aaa; font-size: 14px; padding: 40px 0; }
  .empty   { text-align: center; color: #bbb; font-size: 14px; padding: 40px 0; }
  .refresh-btn {
    display: block; margin: 0 auto 14px;
    background: #0f3460; color: #fff; border: none;
    border-radius: 10px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📊 管理後台</div>
  <div class="header-sub" id="adminName">載入中...</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('today')">📅 今日打卡</button>
  <button class="tab" onclick="switchTab('monthly')">📊 月份打卡</button>
  <button class="tab" onclick="switchTab('leaves')">🗓 請假申請</button>
</div>

<!-- 今日打卡 -->
<div class="panel active" id="panel-today">
  <button class="refresh-btn" onclick="loadToday()">🔄 重新載入</button>
  <div id="today-list"><div class="loading">載入中...</div></div>
</div>

<!-- 月份打卡 -->
<div class="panel" id="panel-monthly">
  <div class="month-bar">
    <button onclick="changeMonth('monthly', -1)">‹</button>
    <div class="month-label" id="monthly-label"></div>
    <button onclick="changeMonth('monthly', 1)">›</button>
  </div>
  <button class="refresh-btn" onclick="loadMonthly()">🔄 重新載入</button>
  <div id="monthly-list"><div class="loading">載入中...</div></div>
</div>

<!-- 請假申請 -->
<div class="panel" id="panel-leaves">
  <div class="month-bar">
    <button onclick="changeMonth('leaves', -1)">‹</button>
    <div class="month-label" id="leaves-label"></div>
    <button onclick="changeMonth('leaves', 1)">›</button>
  </div>
  <button class="refresh-btn" onclick="loadLeaves()">🔄 重新載入</button>
  <div id="leaves-list"><div class="loading">載入中...</div></div>
</div>

<script>
const LIFF_ID = "2010558375-Ps8VaBbn";
const API_URL = "https://script.google.com/macros/s/AKfycbzYwVnpXFGSOGorojA4Axi8zNd6SVZNQKlyLrKLwPjoUDgP9wNubYDHxsCB5sb4XHB8/exec";

let currentTab = 'today';
let monthlyMonth = new Date().toISOString().slice(0, 7);
let leavesMonth  = new Date().toISOString().slice(0, 7);

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['today','monthly','leaves'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');

  if (tab === 'monthly') { updateMonthLabel('monthly'); loadMonthly(); }
  if (tab === 'leaves')  { updateMonthLabel('leaves');  loadLeaves(); }
}

function fmtMonth(m) {
  const [y, mo] = m.split('-');
  return `${y} 年 ${parseInt(mo)} 月`;
}
function updateMonthLabel(type) {
  const m = type === 'monthly' ? monthlyMonth : leavesMonth;
  document.getElementById(type + '-label').textContent = fmtMonth(m);
}
function changeMonth(type, delta) {
  const key = type === 'monthly' ? 'monthlyMonth' : 'leavesMonth';
  const cur = type === 'monthly' ? monthlyMonth : leavesMonth;
  const d = new Date(cur + '-01');
  d.setMonth(d.getMonth() + delta);
  const newM = d.toISOString().slice(0, 7);
  if (type === 'monthly') monthlyMonth = newM;
  else leavesMonth = newM;
  updateMonthLabel(type);
  if (type === 'monthly') loadMonthly();
  else loadLeaves();
}

// ── 今日打卡 ──
async function loadToday() {
  const el = document.getElementById('today-list');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch(`${API_URL}?action=all_today`, { credentials: 'omit' });
    const result = await res.json();
    if (!result.success || !result.employees.length) {
      el.innerHTML = '<div class="empty">今日尚無打卡紀錄</div>'; return;
    }
    const sorted = result.employees.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
    el.innerHTML = sorted.map(emp => {
      const badge = emp.isHoliday
        ? `<span class="badge badge-holiday">假日加班</span>`
        : emp.status === 'in'
          ? `<span class="badge badge-in">上班中</span>`
          : emp.status === 'out'
            ? `<span class="badge badge-out">已下班</span>`
            : `<span class="badge badge-none">未打卡</span>`;
      const times = emp.inTime
        ? `上班 ${emp.inTime}${emp.outTime ? ' ／ 下班 ' + emp.outTime : ''}`
        : '尚未打卡';
      return `<div class="emp-card">
        <div class="emp-header">
          <span class="emp-name">👤 ${emp.name}</span>${badge}
        </div>
        <div class="emp-times">${times}</div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
  }
}

// ── 月份打卡 ──
async function loadMonthly() {
  const el = document.getElementById('monthly-list');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch(`${API_URL}?action=all_monthly&month=${monthlyMonth}`, { credentials: 'omit' });
    const result = await res.json();
    if (!result.success || !result.employees.length) {
      el.innerHTML = '<div class="empty">該月無打卡紀錄</div>'; return;
    }
    const sorted = result.employees.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
    el.innerHTML = sorted.map((emp, idx) => {
      const dayRows = emp.days.map(d => `
        <div class="day-row">
          <span class="day-date">${d.date}</span>
          <span class="day-times">${d.inTime || '--'} ～ ${d.outTime || '--'}</span>
          <span class="day-hours">${d.hours}h</span>
        </div>`).join('');
      return `<div class="emp-card collapsible" onclick="toggleDetail(${idx})">
        <div class="emp-header">
          <span class="emp-name">👤 ${emp.name}</span>
          <span style="font-size:12px;color:#aaa;" id="arrow-${idx}">▼</span>
        </div>
        <div class="summary">
          <div class="summary-item">出勤 <strong>${emp.totalDays} 天</strong></div>
          <div class="summary-item">總工時 <strong>${emp.totalHours} h</strong></div>
        </div>
        <div class="detail-rows" id="detail-${idx}">${dayRows}</div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
  }
}

function toggleDetail(idx) {
  const el = document.getElementById('detail-' + idx);
  const ar = document.getElementById('arrow-' + idx);
  el.classList.toggle('open');
  ar.textContent = el.classList.contains('open') ? '▲' : '▼';
}

// ── 請假申請 ──
async function loadLeaves() {
  const el = document.getElementById('leaves-list');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch(`${API_URL}?action=all_leaves&month=${leavesMonth}`, { credentials: 'omit' });
    const result = await res.json();
    if (!result.success || !result.leaves.length) {
      el.innerHTML = '<div class="empty">該月無請假申請</div>'; return;
    }
    // 依姓名分組
    const byName = {};
    result.leaves.forEach(l => {
      if (!byName[l.name]) byName[l.name] = [];
      byName[l.name].push(l);
    });
    el.innerHTML = Object.entries(byName)
      .sort(([a], [b]) => a.localeCompare(b, 'zh-Hant'))
      .map(([name, leaves]) => {
        const rows = leaves.map(l =>
          `<div class="leave-item">
            <span>📅 ${l.startDate} ～ ${l.endDate}</span>
            <span style="color:#0f3460;font-weight:700;">${l.days} 天</span>
          </div>`
        ).join('');
        const total = leaves.reduce((s, l) => s + Number(l.days), 0);
        return `<div class="leave-card">
          <div class="leave-name">👤 ${name}　<span style="font-size:12px;color:#aaa;">共 ${total} 天</span></div>
          ${rows}
        </div>`;
      }).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty">載入失敗：${e.message}</div>`;
  }
}

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    document.getElementById('adminName').textContent = profile.displayName;
    updateMonthLabel('monthly');
    updateMonthLabel('leaves');
    loadToday();
  } catch(e) {
    document.getElementById('adminName').textContent = '初始化失敗：' + e.message;
  }
}
main();
</script>
</body>
</html>
